<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadet Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>WELCOME CADET</h1>

<div class="profile-box">

<h2 id="studentName"></h2>

<hr>

<p><strong>Student Number:</strong> <span id="studentID"></span></p>

<p><strong>Course:</strong> <span id="course"></span></p>

<p><strong>Year Level:</strong> <span id="year"></span></p>

<p><strong>Flight:</strong> <span id="flight"></span></p>

<p><strong>Date:</strong> <span id="today"></span></p>

<p><strong>Time:</strong> <span id="clock"></span></p>

<p>
<strong>Attendance Status:</strong>
<span id="status" style="color:lime;">
Not Yet Submitted
</span>
</p>

</div>

<br>

<a href="attendance.html" class="btn">
Take Attendance
</a>

<br><br>

<button class="btn logoutBtn" onclick="logout()">
Logout
</button>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
