<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>ROTC Admin Dashboard</title>

<link
    rel="stylesheet"
    href="css/style.css">

</head>


<body>


<div class="container">


<h1>ADMIN CONTROL PANEL</h1>


<hr>


<!-- ================================================== -->
<!-- TRAINING SESSION -->
<!-- ================================================== -->

<h2>Training Session</h2>


<label for="trainingDay">

    Training Day

</label>


<select id="trainingDay">

    <option value="Training Day 1">
        Training Day 1
    </option>

    <option value="Training Day 2">
        Training Day 2
    </option>

    <option value="Training Day 3">
        Training Day 3
    </option>

    <option value="Training Day 4">
        Training Day 4
    </option>

    <option value="Training Day 5">
        Training Day 5
    </option>

    <option value="Training Day 6">
        Training Day 6
    </option>

    <option value="Training Day 7">
        Training Day 7
    </option>

    <option value="Training Day 8">
        Training Day 8
    </option>

    <option value="Training Day 9">
        Training Day 9
    </option>

    <option value="Training Day 10">
        Training Day 10
    </option>

    <option value="Training Day 11">
        Training Day 11
    </option>

    <option value="Training Day 12">
        Training Day 12
    </option>

    <option value="Training Day 13">
        Training Day 13
    </option>

    <option value="Training Day 14">
        Training Day 14
    </option>

    <option value="Training Day 15">
        Training Day 15
    </option>

</select>


<br><br>


<label for="trainingTopic">

    Topic / Subject Discussed

</label>


<input
    type="text"
    id="trainingTopic"
    placeholder="Example: ROTC Orientation and Military Courtesy">


<br><br>


<label for="trainingDate">

    Training Date

</label>


<input
    type="date"
    id="trainingDate">


<hr>


<!-- ================================================== -->
<!-- ATTENDANCE SETTINGS -->
<!-- ================================================== -->

<h2>Attendance Settings</h2>


<label for="attendanceStatus">

    Attendance Status

</label>


<select id="attendanceStatus">

    <option value="OPEN">
        OPEN
    </option>

    <option value="CLOSED">
        CLOSED
    </option>

</select>


<br><br>


<label for="startTime">

    Attendance Start Time

</label>


<input
    type="time"
    id="startTime">


<br><br>


<label for="endTime">

    Attendance End Time

</label>


<input
    type="time"
    id="endTime">


<hr>


<!-- ================================================== -->
<!-- LOCATION SETTINGS -->
<!-- ================================================== -->

<h2>Training Ground Location</h2>


<label for="latitude">

    Training Ground Latitude

</label>


<input
    type="text"
    id="latitude">


<br><br>


<label for="longitude">

    Training Ground Longitude

</label>


<input
    type="text"
    id="longitude">


<br><br>


<button
    class="btn"
    onclick="getCurrentLocation()">

    📍 USE MY CURRENT LOCATION

</button>


<p id="locationStatus"></p>


<br>


<label for="radius">

    Allowed Radius (Meters)

</label>


<input
    type="number"
    id="radius"
    value="200">


<br><br>


<button
    class="btn"
    onclick="saveSettings()">

    💾 SAVE TRAINING SETTINGS

</button>


<hr>


<!-- ================================================== -->
<!-- STUDENT MERITS AND DEMERITS -->
<!-- ================================================== -->

<h2>Student Merits & Demerits</h2>


<p>

Search a student using their Student Number.

</p>


<label for="searchStudentNumber">

    Student Number

</label>


<input
    type="text"
    id="searchStudentNumber"
    placeholder="Enter 10-digit Student Number">


<br><br>


<button
    class="btn"
    onclick="searchStudent()">

    🔍 SEARCH STUDENT

</button>


<br><br>


<div id="studentRecord">


<p>

<strong>Name:</strong>

<span id="recordStudentName">

    Not searched

</span>

</p>


<p>

<strong>Course:</strong>

<span id="recordCourse">

    -

</span>

</p>


<p>

<strong>Year:</strong>

<span id="recordYear">

    -

</span>

</p>


<p>

<strong>Flight:</strong>

<span id="recordFlight">

    -

</span>

</p>


<br>


<label for="studentMerits">

    Merits

</label>


<input
    type="number"
    id="studentMerits"
    value="0">


<br><br>


<label for="studentDemerits">

    Demerits

</label>


<input
    type="number"
    id="studentDemerits"
    value="0">


<br><br>


<button
    class="btn"
    onclick="saveStudentRecord()">

    💾 SAVE STUDENT RECORD

</button>


</div>


<p id="studentRecordStatus"></p>


<hr>


<!-- ================================================== -->
<!-- DOCUMENTS -->
<!-- ================================================== -->

<h2>Documents</h2>


<button
    class="btn"
    onclick="openSheet()">

    📊 OPEN GOOGLE SPREADSHEET

</button>


<hr>


<!-- ================================================== -->
<!-- LOGOUT -->
<!-- ================================================== -->

<button
    class="btn logout-btn"
    onclick="logoutAdmin()">

    LOGOUT

</button>


</div>


<script
    src="js/admin.js">

</script>


</body>

</html>
