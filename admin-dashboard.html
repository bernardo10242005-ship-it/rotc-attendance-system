<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>ROTC Admin Dashboard</title>

<link
rel="stylesheet"
href="css/style.css"
>

</head>


<body>


<div class="container">


<h1>ADMIN CONTROL PANEL</h1>


<hr>


<h2>Attendance Settings</h2>


<label for="attendanceStatus">
Attendance Status
</label>


<select id="attendanceStatus">

<option value="OPEN">
OPEN
</option>

<option value="CLOSED">
CLOSED
</option>

</select>


<br><br>


<label for="trainingDay">
Training Day
</label>


<input
type="text"
id="trainingDay"
placeholder="Example: Training Day 1"
>


<br><br>


<label for="trainingTopic">
Training Topic / Subject
</label>


<input
type="text"
id="trainingTopic"
placeholder="Example: Basic Military Discipline and Formation"
>


<br><br>


<label for="latitude">
Training Ground Latitude
</label>


<input
type="text"
id="latitude"
placeholder="Example: 14.1234567"
>


<br><br>


<label for="longitude">
Training Ground Longitude
</label>


<input
type="text"
id="longitude"
placeholder="Example: 120.1234567"
>


<br><br>


<button
class="btn"
type="button"
onclick="getCurrentLocation()"
>

📍 USE MY CURRENT LOCATION

</button>


<p id="locationStatus"></p>


<br>


<label for="radius">
Allowed Radius (Meters)
</label>


<input
type="number"
id="radius"
value="200"
min="1"
>


<br><br>


<label for="startTime">
Attendance Start Time
</label>


<input
type="time"
id="startTime"
value="07:00"
>


<br><br>


<label for="endTime">
Attendance End Time
</label>


<input
type="time"
id="endTime"
value="12:00"
>


<br><br>


<button
class="btn"
type="button"
onclick="saveSettings()"
>

SAVE SETTINGS

</button>


<hr>


<h2>ROTC Training Files</h2>


<p>

Open the main Google Drive folder containing all Training Day folders and attendance spreadsheets.

</p>


<button
class="btn"
type="button"
onclick="openTrainingFiles()"
>

📁 OPEN ROTC TRAINING FILES

</button>


<hr>


<button
class="btn logout-btn"
type="button"
onclick="logoutAdmin()"
>

LOGOUT

</button>


</div>


<script src="js/admin.js"></script>


</body>

</html>
